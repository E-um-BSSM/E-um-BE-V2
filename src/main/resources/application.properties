spring.application.name=eumBeV2

# Datasource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JSON
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-seconds=${JWT_ACCESS_VALIDITY_SECONDS:3600}
jwt.refresh-token-validity-seconds=${JWT_REFRESH_VALIDITY_SECONDS:1209600}
jwt.refresh-token-keep-signed-in-validity-seconds=${JWT_REFRESH_KEEP_SIGNED_IN_VALIDITY_SECONDS:2592000}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Logging
logging.level.root=INFO
logging.level.com.example.eumbev2=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

server.error.include-stacktrace=always
server.error.include-message=always
spring.mvc.log-request-details=true

# App-specific
app.email-verification.code-expiry-minutes=${EMAIL_CODE_EXPIRY_MINUTES:10}
app.password-reset.token-expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:30}
app.password-reset.cleanup-fixed-delay-ms=${PASSWORD_RESET_CLEANUP_FIXED_DELAY_MS:3600000}
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:3000}
