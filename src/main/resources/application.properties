spring.application.name=eumBeV2

# Datasource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/eumbe?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JSON: API spec uses snake_case field names (access_scope, banner_image_url, ...)
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

# JWT
jwt.secret=${JWT_SECRET:eum-mvp-dev-only-secret-please-override-in-production-01234567890123456789}
jwt.access-token-validity-seconds=${JWT_ACCESS_VALIDITY_SECONDS:3600}
jwt.refresh-token-validity-seconds=${JWT_REFRESH_VALIDITY_SECONDS:1209600}
jwt.refresh-token-keep-signed-in-validity-seconds=${JWT_REFRESH_KEEP_SIGNED_IN_VALIDITY_SECONDS:2592000}

# Mail (email verification code, password reset link)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# App-specific
app.email-verification.code-expiry-minutes=${EMAIL_CODE_EXPIRY_MINUTES:10}
app.password-reset.token-expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:30}
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:3000}
