spring.application.name=eumBeV2

# Tests run against an in-memory H2 database instead of MySQL.
spring.datasource.url=jdbc:h2:mem:eumbe;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

jwt.secret=test-only-secret-not-for-production-01234567890123456789
jwt.access-token-validity-seconds=3600
jwt.refresh-token-validity-seconds=1209600
jwt.refresh-token-keep-signed-in-validity-seconds=2592000

spring.mail.host=localhost
spring.mail.port=25

app.cors.allowed-origins=http://localhost:5173
app.cors.allow-credentials=false
app.email-verification.code-expiry-minutes=10
app.password-reset.token-expiry-minutes=30
app.password-reset.cleanup-fixed-delay-ms=3600000
app.frontend-base-url=http://localhost:3000

app.rate-limit.cleanup-fixed-delay-ms=300000
